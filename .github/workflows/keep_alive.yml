name: Stealth Keep Alive

on:
  schedule:
    # Runs roughly every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  stealth-ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium

      - name: Ping Webapp via Browser
        run: |
          python -c "
          from playwright.sync_api import sync_playwright
          import time
          import random

          # Your Streamlit app URL is already added below
          urls = [
              'https://transitplanetsd9.streamlit.app/'
          ]

          with sync_playwright() as p:
              # Launch a real Chromium browser in headless mode
              browser = p.chromium.launch(headless=True)
              page = browser.new_page()
              
              for url in urls:
                  # Generate a random delay between 30 seconds and 5 minutes
                  sleep_time = random.randint(30, 300)
                  print(f'Waiting {sleep_time} seconds before visiting...')
                  time.sleep(sleep_time)
                  
                  print(f'Visiting {url}...')
                  try:
                      # wait_until='networkidle' ensures the JS and WebSockets load
                      page.goto(url, wait_until='networkidle')
                      print(f'Successfully loaded and rendered {url}')
                  except Exception as e:
                      print(f'Failed to load {url}: {e}')
                      
              browser.close()
          "